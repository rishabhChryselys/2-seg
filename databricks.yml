bundle:
  name: segmentation-streamlit

resources:
  apps:
    segmentation-app:
      name: segmentation-app

      source_code_path: .

      resources:
        cpu: 1
        memory: 2Gi

      command: 
        - streamlit
        - run
        - app/streamlit_app.py
        - --server.port=8000
        - --server.address=0.0.0.0

      environment:
        - name: PYTHONUNBUFFERED
          value: "1"

      dependencies:
        - requirements.txt
